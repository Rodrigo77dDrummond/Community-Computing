<!DOCTYPE html>
<html>
  <head>
    <title>HTML Basic</title>
    <script src="libraries/p5.js"></script>
    <script src="libraries/p5.sound.js"></script>
    <script src="sketch.js"></script>
    <style media="screen">
      div{
        height:100px;
        width:400px;
        background-color: darkgray;
        text-align: center;
        border-style: outset;
        text-decoration: none;
        margin-top: 125px;

        margin-right: auto;
        padding: 10px;
        line-height: 100px;

      }
      div:hover {

      text-align:center;
    }
    </style>
  </head>
  <body>
    <h1> Hey What's Up Welcome to Roddy's Website </h1>

      <div style="height:100px; width:400px; background-color:gold; text-align:center; font-size:300%">
        <strong>Click Here</strong>
      </div>
    </a>
  </body>
</html>
